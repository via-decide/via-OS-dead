<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VIA Spatial OS</title>

  <!-- iOS PWA Hooks -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ff671f">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       CORE VARIABLES & RESET
       ========================================================= */
    :root {
      --bg: #030508;
      --matrix-green: #00ff88;
      --saffron: #ff671f;
      --glass-bg: rgba(6, 10, 20, 0.7);
      --glass-border: rgba(0, 255, 136, 0.2);
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    body { background-color: var(--bg); color: #fff; font-family: var(--font-mono); overflow: hidden; touch-action: none; }

    /* =========================================================
       DIAGNOSTIC HUD (Hidden by default, triple tap top left)
       ========================================================= */
    #os-diagnostics {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(0,0,0,0.85); color: var(--matrix-green);
      font-size: 10px; padding: max(env(safe-area-inset-top), 10px) 10px 10px;
      z-index: 100000; border-bottom: 1px solid var(--matrix-green);
      pointer-events: none; display: none;
    }
    .diag-log { margin-bottom: 4px; }
    .diag-time { color: #555; margin-right: 8px; }

    /* =========================================================
       PWA INSTALL TRAP (Strict enforcement)
       ========================================================= */
    #install-trap {
      position: fixed; inset: 0; background: var(--bg); z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; text-align: center;
    }
    .brand-logo { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 24px; box-shadow: 0 10px 40px rgba(255, 103, 31, 0.3); border: 1px solid rgba(255,255,255,0.1); object-fit: cover; }
    .trap-logo { font-family: var(--font-display); font-size: 32px; color: var(--saffron); margin-bottom: 20px; letter-spacing: -1px; display: none; /* Hidden in favor of image */ }
    .trap-text { font-size: 14px; color: #888; margin-bottom: 30px; line-height: 1.6; max-width: 300px; }
    .btn-install {
      background: transparent; border: 1px solid var(--matrix-green); color: var(--matrix-green);
      padding: 14px 24px; font-family: var(--font-mono); font-size: 12px; cursor: pointer;
      border-radius: 8px; text-transform: uppercase; letter-spacing: 2px;
    }
    .btn-bypass { margin-top: 20px; font-size: 10px; color: #444; background: none; border: none; cursor: pointer; text-decoration: underline; }

    /* =========================================================
       FRACTAL ROOM ENVIRONMENT (Buttonless UI)
       ========================================================= */
    #room-environment {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s;
    }
    #room-center { text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
    .core-logo { width: 50px; height: 50px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 0 20px rgba(255, 103, 31, 0.2); border: 1px solid rgba(255,255,255,0.05); transition: opacity 0.3s; }
    #room-title { font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; text-transform: uppercase; }
    #room-lore { font-size: 11px; color: #666; max-width: 250px; line-height: 1.5; margin: 0 auto; }
    
    /* The 8 directional text labels indicating where a swipe goes */
    .room-node-label {
      position: absolute; font-size: 10px; color: rgba(255,255,255,0.4);
      pointer-events: none; text-transform: uppercase; letter-spacing: 1px;
      transition: color 0.2s; white-space: nowrap;
    }
    /* Fixed Positioning around the center */
    #label-0 { top: 20%; left: 15%; }
    #label-1 { top: 15%; left: 50%; transform: translateX(-50%); }
    #label-2 { top: 20%; right: 15%; }
    #label-3 { top: 40%; left: 10%; }
    #label-5 { top: 40%; right: 10%; }
    #label-6 { bottom: 35%; left: 15%; }
    #label-7 { bottom: 30%; left: 50%; transform: translateX(-50%); }
    #label-8 { bottom: 35%; right: 15%; }

    /* =========================================================
       WINDOW MANAGER (Split-Screen Glass Viewports)
       ========================================================= */
    #window-manager {
      position: fixed; inset: 0; 
      padding: max(env(safe-area-inset-top), 20px) 20px; 
      /* THUMB ZONE CLEARANCE - Crucial for mobile ergonomics */
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 300px); 
      display: flex; flex-direction: column; justify-content: flex-end; gap: 12px;
      z-index: 50; pointer-events: none;
    }
    .glass-window {
      pointer-events: auto; flex: 1; min-height: 0;
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      display: flex; flex-direction: column; overflow: hidden;
      animation: slideUp 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    }
    @keyframes slideUp { from { transform: translateY(50px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
    .window-header {
      height: 36px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
    }
    .window-title { font-size: 10px; color: var(--matrix-green); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .window-close { color: #888; font-size: 14px; cursor: pointer; padding: 4px; }
    .window-content { flex: 1; width: 100%; border: none; background: #000; }

    /* =========================================================
       THUMB ZONE MATRIX (The 3x3 Grid)
       ========================================================= */
    #os-minimap {
      position: fixed;
      /* Anchored securely above the native swipe bar */
      bottom: calc(env(safe-area-inset-bottom, 10px) + 20px);
      left: 50%; transform: translateX(-50%);
      width: 260px; height: 260px;
      z-index: 9999;
      touch-action: none; /* Prevents browser scrolling while drawing */
    }
    
    #grid-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    #trace-line { fill: none; stroke: var(--matrix-green); stroke-width: 3px; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 8px rgba(0,255,136,0.5)); transition: stroke 0.2s, filter 0.2s; }
    
    #dots-container { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); z-index: 2; }
    .dot-cell { display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 50%; transition: all 0.2s; }
    .dot.active { background: var(--matrix-green); box-shadow: 0 0 12px var(--matrix-green); transform: scale(1.5); }
    .dot.center-dot { width: 12px; height: 12px; border: 1px solid rgba(255,255,255,0.3); background: transparent; }

    /* =========================================================
       SIGIL RECOGNITION FLASH (Master Key Visuals)
       ========================================================= */
    body.sigil-flash #trace-line { stroke: var(--saffron) !important; filter: drop-shadow(0 0 15px var(--saffron)) !important; }
    body.sigil-flash .dot.active { background: var(--saffron) !important; box-shadow: 0 0 15px var(--saffron) !important; }
    body.sigil-flash #room-title { color: var(--saffron); }

  </style>
</head>
<body>

  <!-- DIAGNOSTICS -->
  <div id="os-diagnostics">
    <div id="diag-content"></div>
  </div>

  <!-- PWA INSTALL TRAP -->
  <div id="install-trap">
    <img src="1000221390.jpg" alt="DH OS Logo" class="brand-logo" onerror="this.style.display='none';">
    <div class="trap-logo">DH OS</div>
    <div class="trap-text">A standalone spatial environment. Installation required for neural linkage.</div>
    <button class="btn-install" id="btn-install">Initialize System</button>
    <button class="btn-bypass" id="btn-bypass">Bypass (Developer Mode)</button>
  </div>

  <!-- WINDOW MANAGER (Split Screen) -->
  <div id="window-manager"></div>

  <!-- FRACTAL ROOM ENVIRONMENT -->
  <div id="room-environment">
    <!-- Directional Labels for fractal diving -->
    <div class="room-node-label" id="label-0"></div>
    <div class="room-node-label" id="label-1"></div>
    <div class="room-node-label" id="label-2"></div>
    <div class="room-node-label" id="label-3"></div>
    <div class="room-node-label" id="label-5"></div>
    <div class="room-node-label" id="label-6"></div>
    <div class="room-node-label" id="label-7"></div>
    <div class="room-node-label" id="label-8"></div>
    
    <div id="room-center">
      <img src="1000221390.jpg" alt="Core Logo" class="core-logo" id="dynamic-core-logo" onerror="this.style.display='none';">
      <div id="room-title">Galaxy Core</div>
      <div id="room-lore">Swipe from center to dive into a sector. Tap center to ascend.</div>
    </div>
  </div>

  <!-- THUMB ZONE MATRIX -->
  <div id="os-minimap">
    <svg id="grid-svg"><polyline id="trace-line" points=""/></svg>
    <div id="dots-container">
      <div class="dot-cell"><div class="dot" id="dot-0"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-1"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-2"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-3"></div></div>
      <div class="dot-cell"><div class="dot center-dot" id="dot-4"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-5"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-6"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-7"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-8"></div></div>
    </div>
  </div>

  <script>
    /* =========================================================
       0. PWA ENFORCEMENT & SERVICE WORKER INJECTION
       ========================================================= */
    const swCode = `self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => new Response('Offline'))); });`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(blob));

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
    });

    document.getElementById('btn-install').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('install-trap').remove();
      } else {
        alert("PWA install not ready. Use browser menu 'Add to Home Screen'.");
      }
    });

    document.getElementById('btn-bypass').addEventListener('click', () => {
      document.getElementById('install-trap').remove();
    });

    // Auto-remove trap if already standalone
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
      document.getElementById('install-trap').remove();
    }

    /* =========================================================
       1. DIAGNOSTICS ENGINE
       ========================================================= */
    const diagEl = document.getElementById('os-diagnostics');
    const diagContent = document.getElementById('diag-content');
    let tapCount = 0;

    // Triple tap top-left corner to toggle diagnostics
    document.body.addEventListener('touchstart', (e) => {
      if (e.touches[0].clientX < 60 && e.touches[0].clientY < 60) {
        tapCount++;
        if (tapCount === 3) {
          diagEl.style.display = diagEl.style.display === 'none' ? 'block' : 'none';
          tapCount = 0;
        }
        setTimeout(() => tapCount = 0, 1500);
      }
    });

    function logDiag(type, msg) {
      const now = new Date().toLocaleTimeString([], {hour12:false});
      const entry = document.createElement('div');
      entry.className = 'diag-log';
      entry.innerHTML = `<span class="diag-time">[${now}]</span> <strong>[${type}]</strong> ${msg}`;
      diagContent.prepend(entry);
      if(diagContent.children.length > 8) diagContent.lastChild.remove();
      console.log(`[OS] ${type}: ${msg}`);
    }

    /* =========================================================
       2. ECOSYSTEM DATA (The ViaDecide Architecture)
       ========================================================= */
    const ROOT_GALAXY = {
      name: "ViaDecide Root",
      lore: "The central nervous system.",
      nodes: {
        0: { id: "logic-academy", name: "Logic Academy", lore: "Mathematical giants.", type: "zone", 
             tools: [{name: "Thales", id: "thales"}, {name: "Pythagoras", id: "pythagoras"}, {name: "Euclid", id: "euclid"}, {name: "Archimedes", id: "archimedes"}, null, {name: "Aryabhata", id: "aryabhata"}, {name: "Al-Khwarizmi", id: "al-khwarizmi"}] 
           },
        1: { id: "creator-studio", name: "Creator Studio", lore: "PromptAlchemy packs.", type: "zone",
             tools: [{name: "Course Builder", id: "course-builder"}, {name: "Idea Remixer", id: "idea-remixer"}, {name: "Palette Studio", id: "palette-studio"}]
           },
        2: { id: "analytics-bay", name: "Analytics Bay", lore: "Business signals.", type: "zone",
             tools: [{name: "Revenue Forecaster", id: "revenue-forecaster"}, {name: "Meeting Cost", id: "meeting-cost"}, {name: "Code Gen", id: "code-gen"}]
           },
        3: { id: "game-arena", name: "Game Arena", lore: "Decisions become battles.", type: "zone",
             tools: [{name: "HexWars", id: "hexwars"}, {name: "ViaLogic", id: "vialogic"}, {name: "Snake", id: "snake"}, {name: "FreeCell", id: "freecell"}]
           },
        5: { id: "mission-control", name: "Mission Control", lore: "Orbital command.", type: "zone",
             tools: [{name: "Command Center", id: "command-center"}, {name: "Tool Discovery", id: "tool-discovery"}, {name: "Drone UI", id: "drone-ui"}]
           },
        6: { id: "decision-core", name: "Decision Core", lore: "The crystalline heart.", type: "zone",
             tools: [{name: "Matrix", id: "decision-matrix"}, {name: "Scenario Planner", id: "scenario-planner"}, {name: "Output Evaluator", id: "output-evaluator"}]
           },
        7: { id: "orchard-engine", name: "Orchard Engine", lore: "A living meritocracy.", type: "zone",
             tools: [{name: "Player Signup", id: "player-signup"}, {name: "Daily Quests", id: "daily-quests"}, {name: "Yield Engine", id: "yield-engine"}, {name: "Fair Ranking", id: "fair-ranking"}]
           },
        8: { id: "mars-outpost", name: "Mars Outpost", lore: "Sol 1. Basaltic Flats.", type: "zone",
             tools: [{name: "Mars Sim", id: "mars-sim"}, {name: "Wave 1 Sim", id: "wave1-sim"}, {name: "Market Dynamics", id: "market-dynamics"}]
           }
      }
    };

    const AppRegistry = {
      "0,1,2": "whatsapp://send",
      "3,4,5": "spotify://",
      "6,7,8": "vnd.youtube://"
    };

    // The Saffron Signature: 2-5-8-7-4-5-6-3-6-9 mapped to array indices 0-8
    const MASTER_KEY_SIGIL = "1,4,7,6,3,4,5,2,5,8";

    /* =========================================================
       3. FRACTAL NAVIGATOR
       ========================================================= */
    let currentZone = null; // null = ROOT

    function renderRoom() {
      const titleEl = document.getElementById('room-title');
      const loreEl = document.getElementById('room-lore');
      const logoEl = document.getElementById('dynamic-core-logo');
      
      // Clear labels
      [0,1,2,3,5,6,7,8].forEach(i => {
        document.getElementById(`label-${i}`).innerText = "";
      });

      if (!currentZone) {
        titleEl.innerText = ROOT_GALAXY.name;
        loreEl.innerText = ROOT_GALAXY.lore;
        logoEl.style.display = 'block'; // Show branding at Root
        
        Object.keys(ROOT_GALAXY.nodes).forEach(pos => {
          document.getElementById(`label-${pos}`).innerText = ROOT_GALAXY.nodes[pos].name;
        });
      } else {
        titleEl.innerText = currentZone.name;
        loreEl.innerText = currentZone.lore;
        logoEl.style.display = 'none'; // Hide branding when deep inside a tool zone
        
        // Map tools to outer dots
        if(currentZone.tools) {
           const mapSlots = [0,1,2,3,5,6,7,8];
           currentZone.tools.forEach((tool, idx) => {
             if(tool && mapSlots[idx] !== undefined) {
               document.getElementById(`label-${mapSlots[idx]}`).innerText = tool.name;
             }
           });
        }
      }
    }

    function animateFractalTransition(targetPos, isRecall) {
      const room = document.getElementById('room-environment');
      // Define transform origins based on swipe direction
      const origins = { 0:"top left", 1:"top center", 2:"top right", 3:"center left", 5:"center right", 6:"bottom left", 7:"bottom center", 8:"bottom right" };
      
      room.style.transformOrigin = isRecall ? "center center" : (origins[targetPos] || "center");
      room.style.transform = isRecall ? "scale(0.5)" : "scale(2.5)";
      room.style.opacity = "0";

      setTimeout(() => {
        renderRoom();
        room.style.transition = "none";
        room.style.transform = isRecall ? "scale(2.5)" : "scale(0.5)";
        
        // Force reflow
        void room.offsetWidth;
        
        room.style.transition = "transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s";
        room.style.transform = "scale(1)";
        room.style.opacity = "1";
      }, 300);
    }

    /* =========================================================
       4. WINDOW MANAGER (Split Screen)
       ========================================================= */
    const wm = document.getElementById('window-manager');

    // TOUCH ZONE ISOLATION: Scrolling inside an active iframe/tool must NEVER
    // bleed through to the 3x3 pattern tracer underneath. stopPropagation on
    // the manager layer is the single point of containment.
    document.getElementById('window-manager').addEventListener('touchmove', (e) => {
      e.stopPropagation();
    }, { passive: true });
    
    function openWindow(title, url) {
      // Max 2 windows — evict oldest if full
      if (wm.children.length >= 2) {
        wm.firstElementChild.remove();
      }
      
      const win = document.createElement('div');
      win.className = 'glass-window';
      win.innerHTML = `
        <div class="window-header">
          <span class="window-title">${title}</span>
          <span class="window-close">✕</span>
        </div>
        <div class="window-content">
          <iframe src="${url}" style="width:100%; height:100%; border:none; background:var(--bg);"></iframe>
        </div>
      `;
      
      win.querySelector('.window-close').addEventListener('click', () => win.remove());
      wm.appendChild(win);
    }

    /* =========================================================
       5. PATTERN TRACER (Allows Overlapping / Continuous Flow)
       ========================================================= */
    const minimap = document.getElementById('os-minimap');
    const svgLine = document.getElementById('trace-line');
    let path = [];
    let isTracing = false;

    // Get dot centers for SVG drawing
    function getDotCenter(idx) {
      const dot = document.getElementById(`dot-${idx}`);
      const rect = dot.getBoundingClientRect();
      const mapRect = minimap.getBoundingClientRect();
      return { x: rect.left - mapRect.left + rect.width/2, y: rect.top - mapRect.top + rect.height/2 };
    }

    function drawSVG(touchX, touchY) {
      let pts = path.map(idx => {
        let c = getDotCenter(idx);
        return `${c.x},${c.y}`;
      });
      if(isTracing && touchX !== undefined) pts.push(`${touchX},${touchY}`);
      svgLine.setAttribute('points', pts.join(' '));
    }

    function handleTouch(e) {
      const t = e.touches[0];
      const mapRect = minimap.getBoundingClientRect();
      const x = t.clientX - mapRect.left;
      const y = t.clientY - mapRect.top;
      
      // Calculate grid cell (3x3)
      const col = Math.floor((x / mapRect.width) * 3);
      const row = Math.floor((y / mapRect.height) * 3);
      
      if (col >= 0 && col <= 2 && row >= 0 && row <= 2) {
        const idx = row * 3 + col;
        // ONLY restriction: don't push the exact same dot twice in a row. Loops are allowed.
        if (path.length === 0 || path[path.length - 1] !== idx) {
          path.push(idx);
          document.getElementById(`dot-${idx}`).classList.add('active');
          
          // Haptic feedback if available
          if(navigator.vibrate) navigator.vibrate(15);
        }
      }
      drawSVG(x, y);
    }

    minimap.addEventListener('touchstart', e => { e.preventDefault(); isTracing = true; path = []; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); handleTouch(e); });
    minimap.addEventListener('touchmove', e => { e.preventDefault(); if (isTracing) handleTouch(e); });
    minimap.addEventListener('touchend', e => { e.preventDefault(); isTracing = false; drawSVG(); processPattern(); });

    // Mouse aliases — Desktop + Chrome DevTools mobile emulator support
    function handleMouse(e) {
      const mapRect = minimap.getBoundingClientRect();
      const x = e.clientX - mapRect.left;
      const y = e.clientY - mapRect.top;
      const col = Math.floor((x / mapRect.width) * 3);
      const row = Math.floor((y / mapRect.height) * 3);
      if (col >= 0 && col <= 2 && row >= 0 && row <= 2) {
        const idx = row * 3 + col;
        if (path.length === 0 || path[path.length - 1] !== idx) {
          path.push(idx);
          document.getElementById(`dot-${idx}`).classList.add('active');
          if (navigator.vibrate) navigator.vibrate(15);
        }
      }
      let pts = path.map(i => { let c = getDotCenter(i); return `${c.x},${c.y}`; });
      if (isTracing) pts.push(`${x},${y}`);
      svgLine.setAttribute('points', pts.join(' '));
    }
    minimap.addEventListener('mousedown', e => { isTracing = true; path = []; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); handleMouse(e); });
    minimap.addEventListener('mousemove', e => { if (isTracing) handleMouse(e); });
    minimap.addEventListener('mouseup', () => { isTracing = false; drawSVG(); processPattern(); });
    minimap.addEventListener('mouseleave', () => { if (isTracing) { isTracing = false; drawSVG(); processPattern(); } });

    /* =========================================================
       6. THE STRICT WATERFALL ROUTING ENGINE
       ========================================================= */
    function processPattern() {
      const seed = path.join(',');
      if (!seed) return;

      // Reset traces visually after a delay
      setTimeout(() => {
        if(!isTracing) {
           svgLine.setAttribute('points', '');
           document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
           document.body.classList.remove('sigil-flash');
        }
      }, 500);

      // STEP A: THE MASTER KEY SIGIL
      if (seed === MASTER_KEY_SIGIL) {
        document.body.classList.add('sigil-flash');
        logDiag('MASTER_SIGIL', 'Cryptographic signature recognized.');
        
        // 300ms theatrical pause before launching Root Console
        setTimeout(() => {
          openWindow('Developer Console [CLASSIFIED]', './tools/developer-vault/index.html');
        }, 300);
        return;
      }

      // STEP B: NATIVE DEEP LINKS
      if (AppRegistry[seed]) {
        logDiag('DEEP_LINK', `Firing Intent: ${AppRegistry[seed]}`);
        window.location.href = AppRegistry[seed];
        return;
      }

      // STEP C: FRACTAL NAVIGATION (Buttonless Movement)
      // Forgiving swipe: center-first, any length >= 2. path[1] is the primary directional intent.
      if (path[0] === 4 && path.length >= 2) {
        const target = path[1];
        if (!currentZone) {
          // Dive into a Macro Zone
          if (ROOT_GALAXY.nodes[target]) {
            currentZone = ROOT_GALAXY.nodes[target];
            logDiag('FRACTAL_NAV', `Diving to Zone: ${currentZone.name}`);
            animateFractalTransition(target, false);
          }
        } else {
          // Already in a Zone, swipe opens a Tool
          const mapSlots = [0,1,2,3,-1,5,6,7,8]; // -1 is center
          const toolIdx = mapSlots.indexOf(target);
          if(currentZone.tools && currentZone.tools[toolIdx]) {
             const tool = currentZone.tools[toolIdx];
             logDiag('TOOL_LAUNCH', `Opening ${tool.name}`);
             const toolUrl = `./tools/${currentZone.id}/${tool.id}/index.html`;
             openWindow(tool.name, toolUrl);
          }
        }
        return;
      }

      // STEP D: FRACTAL RECALL (Zooming Out)
      // Tap center dot only
      if (path.length === 1 && path[0] === 4) {
        if (currentZone) {
           logDiag('FRACTAL_NAV', 'Ascending to Galaxy Root');
           currentZone = null;
           animateFractalTransition(4, true);
        } else {
           logDiag('FRACTAL_NAV', 'Already at Root');
        }
        return;
      }

      // STEP E: PROCEDURAL FALLBACK (Uncharted Space)
      logDiag('PROCEDURAL', `Unknown pattern trace: [${seed}]. Ignored.`);
      // Optional: Flash red or glitch effect here.
    }

    // Init display
    renderRoom();
    logDiag('SYSTEM', 'VIA OS Boot Sequence Complete. Waiting for input.');

  </script>
</body>
